<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI - Fullscreen Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ui-panel">
        <div class="logo-area">
            <h1>NEXUS</h1>
            <div id="fps-counter">FPS: --</div>
        </div>
        
        <div class="gesture-guide">
            <div class="guide-item"><span class="icon">☝️</span> <strong>Index Finger:</strong> Draw</div>
            <div class="guide-item"><span class="icon">✌️</span> <strong>Index + Middle:</strong> Erase</div>
        </div>

        <div class="color-picker-section">
            <label>Brush Color:</label>
            <div class="color-palette">
                <div class="color-swatch active" style="background: #00f0ff;" data-color="#00f0ff"></div>
                <div class="color-swatch" style="background: #ff0055;" data-color="#ff0055"></div>
                <div class="color-swatch" style="background: #00ff66;" data-color="#00ff66"></div>
                <div class="color-swatch" style="background: #ffcc00;" data-color="#ffcc00"></div>
                <div class="color-swatch" style="background: #ffffff;" data-color="#ffffff"></div>
            </div>
        </div>
    </div>

    <div id="loading">Initializing Nexus Engine...</div>

    <canvas id="output_canvas"></canvas>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8";

        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const fpsCounter = document.getElementById('fps-counter');
        const loadingDiv = document.getElementById('loading');
        const swatches = document.querySelectorAll('.color-swatch');

        let handLandmarker = undefined;
        let webcamElement = null;
        let lastVideoTime = -1;
        
        // Performance & FPS Tracking
        let lastFrameTime = performance.now();
        let frameCount = 0;
        let fps = 0;

        // Drawing state
        let currentColor = '#00f0ff';
        let lastX = null;
        let lastY = null;

        // Persistent Canvas for storing drawings
        const drawingCanvas = document.createElement('canvas');
        const drawCtx = drawingCanvas.getContext('2d');

        // Color selection handler
        swatches.forEach(swatch => {
            swatch.addEventListener('click', (e) => {
                swatches.forEach(s => s.classList.remove('active'));
                e.target.classList.add('active');
                currentColor = e.target.getAttribute('data-color');
            });
        });

        // Set canvases to fit window dimensions dynamically
        function resizeCanvases() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            // Backup existing drawings before resizing wipes canvas context
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = drawingCanvas.width;
            tempCanvas.height = drawingCanvas.height;
            tempCanvas.getContext('2d').drawImage(drawingCanvas, 0, 0);

            canvasElement.width = width;
            canvasElement.height = height;
            drawingCanvas.width = width;
            drawingCanvas.height = height;

            // Restore drawings stretched/fitted to new size
            drawCtx.drawImage(tempCanvas, 0, 0, tempCanvas.width, tempCanvas.height, 0, 0, width, height);
            
            // Reconfigure drawing brush settings
            drawCtx.lineCap = 'round';
            drawCtx.lineJoin = 'round';
        }
        window.addEventListener('resize', resizeCanvases);
        resizeCanvases();

        // Initialize Next-Gen MediaPipe Hand Tracker
        async function initializeTracker() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker_num%2D1/float16/1/hand_landmarker_num%2D1.task`,
                    delegate: "GPU" // Enforces hardware acceleration for extreme speed
                },
                runningMode: "VIDEO",
                numHands: 1
            });
            
            loadingDiv.style.opacity = '0';
            setTimeout(() => loadingDiv.style.display = 'none', 500);
            startWebcam();
        }

        // Setup Webcam Stream
        function startWebcam() {
            webcamElement = document.createElement('video');
            webcamElement.autoplay = true;
            webcamElement.playsInline = true;

            navigator.mediaDevices.getUserMedia({ 
                video: { width: 1280, height: 720, frameRate: { ideal: 60 } } 
            }).then((stream) => {
                webcamElement.srcObject = stream;
                webcamElement.addEventListener("loadeddata", predictWebcamLoop);
            }).catch(err => {
                alert("Camera access required for tracking: " + err.message);
            });
        }

        // Core AI Loop
        async function predictWebcamLoop() {
            // Compute real-time frame rates
            const now = performance.now();
            frameCount++;
            if (now >= lastFrameTime + 1000) {
                fps = Math.round((frameCount * 1000) / (now - lastFrameTime));
                fpsCounter.innerText = `FPS: ${fps}`;
                frameCount = 0;
                lastFrameTime = now;
            }

            // Clear framework canvas
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (webcamElement.currentTime !== lastVideoTime) {
                lastVideoTime = webcamElement.currentTime;
                
                // Mirror webcam frame mapping output directly on screen background
                canvasCtx.save();
                canvasCtx.translate(canvasElement.width, 0);
                canvasCtx.scale(-1, 1);
                canvasCtx.drawImage(webcamElement, 0, 0, canvasElement.width, canvasElement.height);
                canvasCtx.restore();

                // Run inference through MediaPipe Task Vision model
                const startTimeMs = performance.now();
                const results = handLandmarker.detectForVideo(webcamElement, startTimeMs);

                let isDrawing = false;
                let isErasing = false;

                if (results.landmarks && results.landmarks.length > 0) {
                    const landmarks = results.landmarks[0];

                    // Map critical landmark tracking points
                    const indexTip = landmarks[8];
                    const indexBase = landmarks[5];
                    const middleTip = landmarks[12];
                    const middleBase = landmarks[9];
                    const ringTip = landmarks[16];
                    const ringBase = landmarks[13];
                    const pinkyTip = landmarks[20];
                    const pinkyBase = landmarks[17];

                    const indexExtended = indexTip.y < indexBase.y;
                    const middleExtended = middleTip.y < middleBase.y;
                    const ringExtended = ringTip.y < ringBase.y;
                    const pinkyExtended = pinkyTip.y < pinkyBase.y;

                    // Gesture Logic Mapping
                    // Index + Middle extended = ERASE
                    if (indexExtended && middleExtended && !ringExtended && !pinkyExtended) {
                        isErasing = true;
                    } 
                    // Only Index extended = DRAW
                    else if (indexExtended && !middleExtended && !ringExtended && !pinkyExtended) {
                        isDrawing = true;
                    }

                    // Convert normalized coordinates (0.0 to 1.0) into flipped window positions
                    const currentX = canvasElement.width - (indexTip.x * canvasElement.width);
                    const currentY = indexTip.y * canvasElement.height;

                    const eraserX = canvasElement.width - (((indexTip.x + middleTip.x) / 2) * canvasElement.width);
                    const eraserY = ((indexTip.y + middleTip.y) / 2) * canvasElement.height;

                    if (isDrawing) {
                        if (lastX !== null && lastY !== null) {
                            drawCtx.globalCompositeOperation = 'source-over';
                            drawCtx.strokeStyle = currentColor;
                            drawCtx.lineWidth = 8;
                            drawCtx.beginPath();
                            drawCtx.moveTo(lastX, lastY);
                            drawCtx.lineTo(currentX, currentY);
                            drawCtx.stroke();
                        }
                        lastX = currentX;
                        lastY = currentY;

                        // Visual brush indicator ring
                        canvasCtx.fillStyle = currentColor;
                        canvasCtx.shadowBlur = 15;
                        canvasCtx.shadowColor = currentColor;
                        canvasCtx.beginPath();
                        canvasCtx.arc(currentX, currentY, 6, 0, 2 * Math.PI);
                        canvasCtx.fill();
                        canvasCtx.shadowBlur = 0; // reset glow

                    } else if (isErasing) {
                        if (lastX !== null && lastY !== null) {
                            drawCtx.globalCompositeOperation = 'destination-out';
                            drawCtx.lineWidth = 50; 
                            drawCtx.beginPath();
                            drawCtx.moveTo(lastX, lastY);
                            drawCtx.lineTo(eraserX, eraserY);
                            drawCtx.stroke();
                        }
                        lastX = eraserX;
                        lastY = eraserY;

                        // Eraser target circle UI
                        canvasCtx.strokeStyle = 'rgba(255, 0, 85, 0.8)';
                        canvasCtx.lineWidth = 3;
                        canvasCtx.fillStyle = 'rgba(255, 0, 85, 0.15)';
                        canvasCtx.beginPath();
                        canvasCtx.arc(eraserX, eraserY, 25, 0, 2 * Math.PI);
                        canvasCtx.fill();
                        canvasCtx.stroke();
                    } else {
                        lastX = null;
                        lastY = null;
                    }
                    
                    // Render modern joint overlay matrix tracking dots 
                    drawMinimalHandJoints(canvasCtx, landmarks);
                } else {
                    lastX = null;
                    lastY = null;
                }
            }

            // Overlay drawings layer
            canvasCtx.drawImage(drawingCanvas, 0, 0);

            // Re-render window frames sequentially loop
            window.requestAnimationFrame(predictWebcamLoop);
        }

        function drawMinimalHandJoints(ctx, landmarks) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            for (let i = 0; i < landmarks.length; i++) {
                const x = canvasElement.width - (landmarks[i].x * canvasElement.width);
                const y = landmarks[i].y * canvasElement.height;
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, 2 * Math.PI);
                ctx.fill();
            }
        }

        initializeTracker();
    </script>
</body>
</html>
