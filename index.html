<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI OS — Premium Spatial tracking Suite</title>
    
    <style>
        :root {
            --bg-dark: #030307;
            --panel-bg: rgba(6, 6, 15, 0.45);
            --border-glow: rgba(0, 240, 255, 0.15);
            --accent-cyan: #00f0ff;
            --accent-purple: #bf55ec;
            --accent-pink: #ff1e6b;
            --accent-green: #00ff73;
            --text-main: #f5f5fa;
            --text-muted: #7d7d93;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-dark); 
            font-family: var(--font-stack); 
            color: var(--text-main); 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh;
        }
        
        /* High-fidelity glowing grid overlay */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 3;
            pointer-events: none;
        }
        
        #webcam_feed {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
            filter: contrast(1.05) brightness(0.95);
        }

        #output_canvas { 
            position: absolute; 
            inset: 0;
            width: 100%; 
            height: 100%; 
            z-index: 2;
            pointer-events: none;
        }
        
        /* Refined Top Navigation Bar */
        .top-nav { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 90px; 
            z-index: 10; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 40px; 
            background: linear-gradient(to bottom, rgba(3,3,7,0.9) 20%, rgba(3,3,7,0)); 
            pointer-events: none; 
        }
        
        .brand { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            pointer-events: auto; 
        }
        
        .brand-logo { 
            width: 14px; 
            height: 14px; 
            background: var(--accent-cyan); 
            border-radius: 50%; 
            box-shadow: 0 0 20px 4px var(--accent-cyan); 
            animation: pulse 2.5s infinite ease-in-out; 
        }
        
        .brand h1 { 
            font-size: 1.1rem; 
            font-weight: 800; 
            letter-spacing: 6px; 
            color: #ffffff; 
            text-transform: uppercase;
        }

        /* Cyberpunk Glassmorphic Dashboard HUD */
        .hud-panel { 
            position: absolute; 
            top: 110px; 
            left: 40px; 
            z-index: 10; 
            background: var(--panel-bg); 
            border: 1px solid var(--border-glow); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px); 
            padding: 26px; 
            border-radius: 20px; 
            width: 350px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255,255,255,0.1); 
            transition: opacity 0.4s ease, transform 0.4s ease; 
        }
        
        .panel-section { margin-bottom: 22px; }
        .panel-section:last-child { margin-bottom: 0; }
        
        .section-title { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: var(--text-muted); 
            font-weight: 700; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        #fps-counter { 
            background: rgba(0, 240, 255, 0.08); 
            border: 1px solid rgba(0, 240, 255, 0.25); 
            padding: 3px 10px; 
            border-radius: 6px; 
            color: var(--accent-cyan); 
            font-weight: 700; 
            font-family: monospace;
            font-size: 0.75rem;
        }

        .camera-control-box { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            background: rgba(255, 255, 255, 0.02); 
            padding: 10px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.04); 
        }
        
        .btn-switch-camera { 
            background: linear-gradient(135deg, rgba(0,240,255,0.12) 0%, rgba(191,85,236,0.12) 100%); 
            border: 1px solid rgba(0, 240, 255, 0.35); 
            color: #ffffff; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 0.75rem; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); 
            width: 100%; 
        }
        
        .btn-switch-camera:hover { 
            border-color: var(--accent-cyan); 
            background: linear-gradient(135deg, rgba(0,240,255,0.2) 0%, rgba(191,85,236,0.2) 100%); 
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.25);
            transform: translateY(-1px);
        }
        
        .camera-status-text { 
            font-size: 0.68rem; 
            color: var(--text-muted); 
            text-align: center; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }

        /* Upgraded Voice Module Row */
        .voice-box { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 14px 18px; 
            border-radius: 14px; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .mic-indicator { 
            width: 8px; 
            height: 8px; 
            background: var(--accent-pink); 
            border-radius: 50%; 
            transition: all 0.3s ease; 
        }
        
        .mic-indicator.listening { 
            background: var(--accent-green); 
            box-shadow: 0 0 15px 3px var(--accent-green); 
            animation: pulse 1.2s infinite ease-in-out; 
        }
        
        #voice-transcript { 
            font-size: 0.8rem; 
            color: #ffffff; 
            font-weight: 500; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
            width: 85%; 
            opacity: 0.85;
        }

        /* Sleek Info Gesture Rows */
        .gesture-row { 
            display: flex; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.015); 
            border: 1px solid rgba(255,255,255,0.03);
            padding: 12px 14px; 
            border-radius: 12px; 
            margin-bottom: 8px; 
            gap: 14px; 
        }
        
        .gesture-visual { 
            font-size: 1.2rem; 
            background: rgba(255,255,255,0.03); 
            width: 38px; 
            height: 38px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .gesture-info .title { font-size: 0.85rem; font-weight: 700; color: #ffffff; letter-spacing: 0.5px; }
        .gesture-info .desc { font-size: 0.72rem; color: var(--text-muted); margin-top: 1px; }

        /* Premium Color Engine Selectors */
        .palette-grid { 
            display: flex; 
            gap: 12px; 
            background: rgba(0, 0, 0, 0.3); 
            padding: 10px; 
            border-radius: 14px; 
            justify-content: space-between; 
            border: 1px solid rgba(255,255,255,0.02);
        }
        
        .color-node { 
            width: 28px; 
            height: 28px; 
            border-radius: 50%; 
            cursor: pointer; 
            border: 2px solid transparent; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative;
        }
        
        .color-node:hover { transform: scale(1.15); }
        
        .color-node.active { 
            border-color: #ffffff; 
            transform: scale(1.2); 
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* ==========================================
           PREMIUM FULLSCREEN PORTAL TRANSITIONS
        ========================================== */
        .game-matrix-container {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            z-index: 200;
            display: none;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: scale(1.05);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .game-matrix-container.visible {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }
        
        .game-header {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 210;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .game-floating-title {
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            letter-spacing: 5px;
            font-weight: 700;
            text-transform: uppercase;
            font-family: var(--font-stack);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

            background
