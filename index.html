<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Tracking — Dual-Hand Ultra-Fast Spatial Tracking</title>
    
    <style>
        :root {
            --bg-dark: #06060c;
            --accent-cyan: #00f0ff;
            --accent-purple: #9d4edd;
            --accent-pink: #ff0055;
            --panel-glass: rgba(10, 10, 22, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f5;
            --text-muted: #8a8a9e;
        }

        * { box-sizing: border-box; user-select: none; }
        body { margin: 0; padding: 0; background-color: var(--bg-dark); font-family: -apple-system, sans-serif; color: var(--text-main); overflow: hidden; width: 100vw; height: 100vh; }
        
        #webcam_feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
            background-color: var(--bg-dark);
        }

        #output_canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: 2;
            display: block; 
            pointer-events: none;
        }
        
        .top-nav { position: absolute; top: 0; left: 0; width: 100%; height: 80px; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; background: linear-gradient(to bottom, rgba(6,6,12,0.8), rgba(6,6,12,0)); pointer-events: none; }
        .brand { display: flex; align-items: center; gap: 12px; pointer-events: auto; }
        .brand-logo { width: 12px; height: 12px; background: var(--accent-cyan); border-radius: 50%; box-shadow: 0 0 15px var(--accent-cyan); animation: pulse 2s infinite; }
        .brand h1 { margin: 0; font-size: 1.4rem; font-weight: 900; letter-spacing: 4px; color: #ffffff; }

        .hud-panel { position: absolute; top: 100px; left: 40px; z-index: 10; background: var(--panel-glass); border: 1px solid var(--border-glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); padding: 30px; border-radius: 24px; width: 340px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4); }
        .panel-section { margin-bottom: 24px; }
        .panel-section:last-child { margin-bottom: 0; }
        .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); font-weight: 700; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
        #fps-counter { background: rgba(0, 240, 255, 0.08); border: 1px solid rgba(0, 240, 255, 0.2); padding: 4px 10px; border-radius: 6px; color: var(--accent-cyan); font-weight: 700; }

        .camera-control-box { display: flex; flex-direction: column; gap: 10px; background: rgba(255, 255, 255, 0.03); padding: 12px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-switch-camera { background: linear-gradient(135deg, rgba(0,240,255,0.1) 0%, rgba(157,78,221,0.1) 100%); border: 1px solid rgba(0, 240, 255, 0.3); color: #ffffff; padding: 10px; border-radius: 8px; font-weight: 600; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; width: 100%; }
        .btn-switch-camera:hover { border-color: var(--accent-cyan); background: rgba(0, 240, 255, 0.15); box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); }
        .camera-status-text { font-size: 0.7rem; color: var(--text-muted); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .gesture-row { display: flex; align-items: center; background: rgba(255, 255, 255, 0.03); padding: 12px 16px; border-radius: 14px; margin-bottom: 10px; gap: 16px; }
        .gesture-visual { font-size: 1.4rem; background: rgba(255,255,255,0.05); width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .gesture-info .title { font-size: 0.9rem; font-weight: 600; color: #ffffff; }
        .gesture-info .desc { font-size: 0.75rem; color: var(--text-muted); }

        .palette-grid { display: flex; gap: 14px; background: rgba(0, 0, 0, 0.2); padding: 12px; border-radius: 16px; justify-content: space-between; }
        .color-node { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.25s; }
        .color-node.active { border-color: #ffffff; transform: scale(1.1); }

        #loading { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-dark); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; transition: opacity 0.5s; padding: 40px; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 2px solid rgba(0, 240, 255, 0.1); border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        .loading-text { font-size: 0.9rem; letter-spacing: 3px; color: var(--text-main); text-transform: uppercase; font-weight: 600; max-width: 500px; line-height: 1.6; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text" id="boot-status">Booting Dual Nexus Core</div>
    </div>

    <div class="top-nav">
        <div class="brand">
            <div class="brand-logo"></div>
            <h1>NEXUS AI MATRIX</h1>
        </div>
    </div>

    <div class="hud-panel">
        <div class="panel-section">
            <div class="section-title">
                <span>System Diagnosis</span>
                <span id="fps-counter">FPS: --</span>
            </div>
        </div>

        <div class="panel-section">
            <div class="section-title">Optical Hardware</div>
            <div class="camera-control-box">
                <button class="btn-switch-camera" id="btn-toggle-cam">🔄 Switch Camera Source</button>
                <div class="camera-status-text" id="camera-label">Initializing hardware...</div>
            </div>
        </div>
        
        <div class="panel-section">
            <div class="section-title">Spatial Gestures (Dual Hand)</div>
            <div class="gesture-row">
                <div class="gesture-visual" style="color: var(--accent-cyan);">☝️</div>
                <div class="gesture-info">
                    <div class="title">Draw Vector</div>
                    <div class="desc">Index up (Either hand)</div>
                </div>
            </div>
            <div class="gesture-row">
                <div class="gesture-visual" style="color: var(--accent-pink);">✌️</div>
                <div class="gesture-info">
                    <div class="title">Fingertip Eraser</div>
                    <div class="desc">Index + Middle together</div>
                </div>
            </div>
        </div>

        <div class="panel-section">
            <div class="section-title">Chroma Engine</div>
            <div class="palette-grid">
                <div class="color-node active" style="background: #00f0ff;" data-color="#00f0ff"></div>
                <div class="color-node" style="background: #9d4edd;" data-color="#9d4edd"></div>
                <div class="color-node" style="background: #ff0055;" data-color="#ff0055"></div>
                <div class="color-node" style="background: #00ff66;" data-color="#00ff66"></div>
                <div class="color-node" style="background: #ffffff;" data-color="#ffffff"></div>
            </div>
        </div>
    </div>

    <video id="webcam_feed" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8";

        const webcamElement = document.getElementById('webcam_feed');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const fpsCounter = document.getElementById('fps-counter');
        const loadingScreen = document.getElementById('loading');
        const bootStatus = document.getElementById('boot-status');
        const colorNodes = document.querySelectorAll('.color-node');
        
        const btnToggleCam = document.getElementById('btn-toggle-cam');
        const cameraLabel = document.getElementById('camera-label');

        let handLandmarker = undefined;
        let localStream = null;
        let videoDevicesList = [];
        let activeDeviceIndex = 0;
        let lastVideoTime = -1;
        let lastFrameTime = performance.now();
        let frameCount = 0;
        let currentBrushColor = '#00f0ff';

        // Tracking anchors across loops for up to 2 distinct hands
        let trackingHistory = [
            { prevX: null, prevY: null }, // Hand Index 0
            { prevX: null, prevY: null }  // Hand Index 1
        ];

        const drawingCanvas = document.createElement('canvas');
        const drawCtx = drawingCanvas.getContext('2d');

        colorNodes.forEach(node => {
            node.addEventListener('click', (e) => {
                colorNodes.forEach(n => n.classList.remove('active'));
                e.target.classList.add('active');
                currentBrushColor = e.target.getAttribute('data-color');
            });
        });

        function synchronizeWindowSize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            const bufferCanvas = document.createElement('canvas');
            bufferCanvas.width = drawingCanvas.width;
            bufferCanvas.height = drawingCanvas.height;
            bufferCanvas.getContext('2d').drawImage(drawingCanvas, 0, 0);

            canvasElement.width = w;
            canvasElement.height = h;
            drawingCanvas.width = w;
            drawingCanvas.height = h;

            drawCtx.drawImage(bufferCanvas, 0, 0, bufferCanvas.width, bufferCanvas.height, 0, 0, w, h);
            drawCtx.lineCap = 'round';
            drawCtx.lineJoin = 'round';
        }
        window.addEventListener('resize', synchronizeWindowSize);
        synchronizeWindowSize();

        async function runNexusEngine() {
            try {
                bootStatus.innerText = "Building Matrix Framework...";
                const locator = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
                );
                
                const targetModelPath = "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task";

                handLandmarker = await HandLandmarker.createFromOptions(locator, {
                    baseOptions: { modelAssetPath: targetModelPath, delegate: "GPU" },
                    runningMode: "VIDEO",
                    numHands: 2 // UPGRADED: Core allows parallel multi-hand calculations
                });
                
                bootStatus.innerText = "Calibrating Optical Inputs...";
                await discoverCameraHardware();
                await initializeCaptureStream();
            } catch (error) {
                console.error("Nexus Core Multi-Fault:", error);
                bootStatus.innerText = "Engine Configuration Fault.";
            }
        }

        async function discoverCameraHardware() {
            try {
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
                tempStream.getTracks().forEach(track => track.stop());
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevicesList = devices.filter(device => device.kind === 'videoinput');
            } catch (e) {
                console.warn("Could not target system arrays:", e);
            }
        }

        async function initializeCaptureStream() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }

            // High Performance Target Profile Configuration (60 FPS Processing target)
            const constraints = {
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 60 } }
            };

            if (videoDevicesList.length > 0) {
                const currentDevice = videoDevicesList[activeDeviceIndex];
                constraints.video.deviceId = { exact: currentDevice.deviceId };
                cameraLabel.innerText = currentDevice.label || `Camera ${activeDeviceIndex + 1}`;
            } else {
                cameraLabel.innerText = "Default Video Pipeline";
            }

            try {
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                webcamElement.srcObject = localStream;
                
                webcamElement.onloadeddata = () => {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => loadingScreen.style.display = 'none', 500);
                    window.requestAnimationFrame(executeRealtimeProcessingLoop);
                };
            } catch (err) {
                console.error("Camera connection dropped:", err);
                cameraLabel.innerText = "Device allocation mismatch";
            }
        }

        btnToggleCam.addEventListener('click', async () => {
            if (videoDevicesList.length <= 1) {
                await discoverCameraHardware();
                if (videoDevicesList.length <= 1) {
                    alert("No secondary hardware devices registered.");
                    return;
                }
            }
            activeDeviceIndex = (activeDeviceIndex + 1) % videoDevicesList.length;
            await initializeCaptureStream();
        });

        async function executeRealtimeProcessingLoop() {
            if (!localStream || !localStream.active) return;

            const timestamp = performance.now();
            frameCount++;
            if (timestamp >= lastFrameTime + 1000) {
                const currentFps = Math.round((frameCount * 1000) / (timestamp - lastFrameTime));
                fpsCounter.innerText = `FPS: ${currentFps}`;
                frameCount = 0;
                lastFrameTime = timestamp;
            }

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (webcamElement.currentTime !== lastVideoTime) {
                lastVideoTime = webcamElement.currentTime;
                
                const trackingResults = handLandmarker.detectForVideo(webcamElement, timestamp);

                // Check tracking instances for both hands dynamically
                if (trackingResults.landmarks && trackingResults.landmarks.length > 0) {
                    
                    // Loop through however many hands are currently inside the screen (up to 2)
                    for (let h = 0; h < trackingResults.landmarks.length; h++) {
                        const nodeArray = trackingResults.landmarks[h];
                        const history = trackingHistory[h];

                        const indexTip = nodeArray[8];
                        const indexBase = nodeArray[5];
                        const middleTip = nodeArray[12];
                        const middleBase = nodeArray[9];
                        const ringTip = nodeArray[16];
                        const ringBase = nodeArray[13];
                        const pinkyTip = nodeArray[20];
                        const pinkyBase = nodeArray[17];

                        const indexExtended = indexTip.y < indexBase.y;
                        const middleExtended = middleTip.y < middleBase.y;
                        const ringExtended = ringTip.y < ringBase.y;
                        const pinkyExtended = pinkyTip.y < pinkyBase.y;

                        // Calculate spatial mirror metrics for the coordinates
                        const targetX = canvasElement.width - (indexTip.x * canvasElement.width);
                        const targetY = indexTip.y * canvasElement.height;

                        const midPointX = canvasElement.width - (((indexTip.x + middleTip.x) / 2) * canvasElement.width);
                        const midPointY = ((indexTip.y + middleTip.y) / 2) * canvasElement.height;

                        // FAST PRECISION ERASER OPERATION: Index & Middle fingers extended together
                        if (indexExtended && middleExtended && !ringExtended && !pinkyExtended) {
                            if (history.prevX !== null && history.prevY !== null) {
                                drawCtx.globalCompositeOperation = 'destination-out';
                                drawCtx.lineWidth = 55; // Snappy precision eraser footprint
                                drawCtx.beginPath();
                                drawCtx.moveTo(history.prevX, history.prevY);
                                drawCtx.lineTo(midPointX, midPointY);
                                drawCtx.stroke();
                            }
                            history.prevX = midPointX;
                            history.prevY = midPointY;

                            // Fast particle indicator ring
                            canvasCtx.strokeStyle = 'rgba(255, 0, 85, 0.9)';
                            canvasCtx.lineWidth = 2;
                            canvasCtx.fillStyle = 'rgba(255, 0, 85, 0.1)';
                            canvasCtx.beginPath();
                            canvasCtx.arc(midPointX, midPointY, 25, 0, 2 * Math.PI);
                            canvasCtx.fill();
                            canvasCtx.stroke();
                        } 
                        // DUAL VECTOR DRAW OPERATION: Index finger isolated up high
                        else if (indexExtended && !middleExtended && !ringExtended && !pinkyExtended) {
                            if (history.prevX !== null && history.prevY !== null) {
                                drawCtx.globalCompositeOperation = 'source-over';
                                drawCtx.strokeStyle = currentBrushColor;
                                drawCtx.lineWidth = 6;
                                drawCtx.beginPath();
                                drawCtx.moveTo(history.prevX, history.prevY);
                                drawCtx.lineTo(targetX, targetY);
                                drawCtx.stroke();
                            }
                            history.prevX = targetX;
                            history.prevY = targetY;

                            canvasCtx.fillStyle = '#ffffff';
                            canvasCtx.shadowBlur = 15;
                            canvasCtx.shadowColor = currentBrushColor;
                            canvasCtx.beginPath();
                            canvasCtx.arc(targetX, targetY, 6, 0, 2 * Math.PI);
                            canvasCtx.fill();
                            canvasCtx.shadowBlur = 0; 
                        } 
                        else {
                            history.prevX = null;
                            history.prevY = null;
                        }
                        
                        renderMinimalistSkeletalTrackNodes(canvasCtx, nodeArray);
                    }

                    // Reset unused tracking slots when only one hand is on screen
                    if (trackingResults.landmarks.length < 2) {
                        trackingHistory[1].prevX = null;
                        trackingHistory[1].prevY = null;
                    }
                } else {
                    // Total wipeout reset if no hands appear
                    trackingHistory[0].prevX = null;
                    trackingHistory[0].prevY = null;
                    trackingHistory[1].prevX = null;
                    trackingHistory[1].prevY = null;
                }
            }

            canvasCtx.drawImage(drawingCanvas, 0, 0);
            window.requestAnimationFrame(executeRealtimeProcessingLoop);
        }

        function renderMinimalistSkeletalTrackNodes(ctx, nodeArray) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
            for (let i = 0; i < nodeArray.length; i++) {
                const targetX = canvasElement.width - (nodeArray[i].x * canvasElement.width);
                const targetY = nodeArray[i].y * canvasElement.height;
                ctx.beginPath();
                ctx.arc(targetX, targetY, 3, 0, 2 * Math.PI);
                ctx.fill();
            }
        }

        runNexusEngine();
    </script>
</body>
</html>
